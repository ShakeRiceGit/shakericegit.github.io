<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>walk</title>
    <meta name="description" content="">
    <link rel="icon" type="image/png" href="../img/icon.png">

    <link rel="stylesheet" href="style.css">

    <link rel="canonical" href="https://shakerice.com/games/walk/index.html">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QLYEFY6N6C"></script>
    <script async src="js/gtag.js"></script>

    <script src="/js/index.js"></script>

<body>
    <header></header>
    <main class="mainBack">
        <div class="mainWrapper">
            <div class="content">
                <div class="title block">
                    <h1>walk</h1>
                    <img class="icon" src="img/icon.png" alt="icon">
                    <section class="play">
                        <div class="links">
                            <a id="Github" href="https://github.com/ShakeRiceGit/shakericegit.github.io/releases/tag/walk" target="_blank">
                                <img src="/img/github-mark.svg">
                            </a>
                        </div>
                    </section>
                </div>
            
                <div class="imgs block">
                    <img src="img/icon.png" alt="img1">
                </div>
                <div id="rule" class="block">
                    <h2>ゲームルール:</h2>
                    <p>
                        左の画面外に出されないようにスコアを上げていく耐久ゲーム<br>
                        たまに出てくる花をとるとスコア加算
                    </p>
                </div>
                <div id="control" class="block">
                    <h2>操作方法:</h2>
                    <table>
                        <tbody>
                            <tr>
                                <th>移動</th>
                                <td>矢印キー(↑↓← →)</td>
                            </tr>    
                        </tbody>
                    </table>
                </div>
                <div id="about" class="block">
                    <h2>About:</h2>
                    <p>
                        2019年(プログラミング初めて2年目くらい)に制作したゲームです。<br>
                        自分の成長をアピールするため、全くそのままの状態で公開することにしました。<br>
                        設計もめちゃくちゃでバグだらけですが、そのあたりはご愛嬌ということで。<br>
                        <br>
                        制作環境：Python(pygame)<br>
                        制作期間：約半年くらい？<br>
                        公開日：2023/6/4
                    </p>
                </div>
                <div class="info block">
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
