<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロック崩し</title>
    <meta name="description" content="">
    <link rel="icon" type="image/png" href="img/icon.png">

    <link rel="stylesheet" href="style.css">

    <link rel="canonical" href="https://shakerice.com/games/breakout/index.html">

    <!--OGP-->
    <meta property="og:title"       content="ブロックくずし"/>
    <meta property="og:image"       content="https://shakerice.com/games/breakout/index.html"/>
    <meta property="og:image"       content="https://shakerice.com/games/breakout/img/icon.png"/>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QLYEFY6N6C"></script>
    <script async src="js/gtag.js"></script>

    <script src="/js/index.js"></script>
</head>
<body>
    <header></header>
    <main class="mainBack">
        <div class="mainWrapper">
            <div class="content">
                <div class="title block">
                    <h1>ブロック崩し</h1>
                    <img class="icon" src="img/icon.png" alt="icon">
                    <div class="play">
                        <section class="links">
                            <a id="Github" href="https://github.com/ShakeRiceGit/shakericegit.github.io/releases/tag/BreakOut" target="_blank">
                                <img src="/img/github-mark.svg">
                            </a>
                        </section>
                    </div>
                </div>
                <div class="imgs block">
                    <img src="img/ScreenShot1.png" alt="img1">
                    <img src="img/ScreenShot2.png" alt="img2">
                </div>
                <div id="rule" class="block">
                    <h2>ゲームルール</h2>
                    <p>
                        バーを動かしてボールを跳ね返し、ブロックを全て壊すとクリア。<br>
                        ボールが下に落ちてしまうとゲームオーバー。<br>
                    </p>
                </div>
                <div id="control" class="block">
                    <h2>操作方法</h2>
                    <table>
                        <tbody>
                            <tr>
                                <th>移動</th>
                                <td>AD or ←→</td>
                            </tr>
                            <tr>
                                <th>リトライ</th>
                                <td>R</td>
                            </tr>
                            <tr>
                                <th>タイトルに戻る</th>
                                <td>T</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="about" class="block">
                    <h2>About:</h2>
                    <p>
                        DirectX9を学んでから初めて製作したゲーム。<br>
                        完成したと思った直後にボールがすり抜けてしまうバグが見つかり、修正にめちゃくちゃ時間がかかりました。<br>
                    </p>
                    <p>
                        制作環境：DirectX9 C++<br>
                        制作期間：約5か月<br>
                        公開日：2024/09/19<br>
                    </p>
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
</body>
</html>
